name: StyleMe Intelligence Bot

on:
  schedule:
    - cron: '*/30 * * * *'  # רץ כל 30 דקות בדיוק
  workflow_dispatch:        # מאפשר לך להריץ ידנית מתי שבא לך

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10     
    
    steps:
      - uses: actions/checkout@v4 

      - name: Set up Python
        uses: actions/setup-python@v5 
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # התקנת הספריות ההכרחיות בלבד
          pip install google-genai feedparser supabase requests

      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
