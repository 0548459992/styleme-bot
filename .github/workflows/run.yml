name: StyleMe Stable 3.9

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.9 (The Stable One)
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' # השינוי הקריטי! גרסה יציבה שלא נתקעת
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # התקנה רגילה ופשוטה. בגרסה 3.9 זה יעבוד מהר.
          pip install google-genai feedparser supabase requests

      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
