name: StyleMe UV Ultimate

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # נותנים לו מספיק זמן, אבל ההתקנה תהיה מהירה
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # גרסה מודרנית ומהירה

      - name: Install uv (The Speed Demon)
        run: |
          # מתקינים את המאיץ
          pip install uv

      - name: Install Dependencies with uv
        run: |
          # uv מתקין הכל בשניות ועוקף התנגשויות
          # הדגל --system אומר לו להתקין ישר למערכת בלי וירטואליזציה (חוסך זמן)
          uv pip install --system google-genai feedparser sgmllib3k supabase requests

      - name: Verify Installation
        run: |
          # בדיקה שהספריות באמת שם
          python -c "import google.genai; import feedparser; print('✅ Libraries Loaded Successfully')"

      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
