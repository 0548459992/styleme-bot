name: StyleMe Bot 3.10

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10 (The Perfect Balance)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # שדרגנו ל-3.10 - בלי אזהרות ובלי תקיעות
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai feedparser supabase requests

      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
