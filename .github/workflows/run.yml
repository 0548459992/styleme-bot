name: StyleMe Bot 3.10 (Firebase)

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # נותנים לו מרחב נשימה

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # הגרסה הכי מאוזנת היום
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai feedparser firebase-admin requests

      - name: Run Bot
        env:
          FIREBASE_CREDENTIALS: ${{ secrets.FIREBASE_CREDENTIALS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
