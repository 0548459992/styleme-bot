name: StyleMe Fast Debug

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10  # <-- שינינו ל-10 דקות! אם זה נתקע, זה יחתוך מיד.

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # שינינו ל-3.11, לפעמים זה פותר בעיות תאימות עם גוגל
          cache: 'pip' 

      - name: Debug - List Files
        run: ls -R

      - name: Install Base Libraries
        run: |
          python -m pip install --upgrade pip
          # מתקין רק את הבסיס קודם כדי לראות אם זה עובד
          pip install requests feedparser supabase --only-binary=:all:

      - name: Install Google GenAI
        run: |
          # התקנה נפרדת כדי לבודד את הבעיה
          pip install google-genai --only-binary=:all:

      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
