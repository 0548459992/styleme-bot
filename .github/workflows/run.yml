name: StyleMe Final Fix

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' 
          # מחקנו את השורה cache: 'pip' שגרמה לשגיאה
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # התקנה ישירה ומהירה
          pip install google-genai feedparser supabase requests

      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
