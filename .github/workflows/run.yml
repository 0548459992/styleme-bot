name: StyleMe UV Fast

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5 # הגנה מתקיעות

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # שלב 1: התקנת הכלי המהיר uv
      - name: Install uv (The Magic Tool)
        run: pip install uv

      # שלב 2: התקנת הספריות בעזרת uv (מהיר פי 100)
      - name: Install Libraries with uv
        run: |
          # uv פותר את הבעיות ש-pip נתקע בהן
          uv pip install --system google-genai feedparser sgmllib3k supabase requests

      # שלב 3: הרצת הבוט
      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
