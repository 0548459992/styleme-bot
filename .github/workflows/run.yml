name: StyleMe Intelligence Bot

on:
  schedule:
    - cron: '*/30 * * * *'  # רץ כל 30 דקות (אופטימלי לגרסה החינמית)
  workflow_dispatch:        # מאפשר הרצה ידנית בלחיצת כפתור

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10     # הגנה מפני בזבוז דקות ריצה במקרה של תקיעה
    
    steps:
      - uses: actions/checkout@v4 # שדרוג לגרסה 4 היציבה

      - name: Set up Python
        uses: actions/setup-python@v5 # שדרוג לגרסה 5
        with:
          python-version: '3.10'      # שדרוג ל-3.10 כדי לתמוך בספריות החדשות של גוגל
          cache: 'pip'                # חיסכון בזמן התקנה

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # התקנת הספריה החדשה של גוגל (google-genai) וספריות עזר
          pip install google-genai feedparser supabase requests

      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
