name: StyleMe Surgical Fix

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 
          cache: 'pip'

      - name: Install Build Tools (The Fixer)
        run: |
          # שלב קריטי: עדכון כלים שמונעים תקיעות בהתקנה
          python -m pip install --upgrade pip setuptools wheel

      - name: Install Problematic Library First
        run: |
          # אנחנו מתקינים את הרכיב הבעייתי לבד כדי ש-feedparser לא יחפש אותו ויתקע
          pip install sgmllib3k

      - name: Install Rest of Libraries
        run: |
          # עכשיו מתקינים את השאר. בגלל ש-sgmllib3k כבר קיים, זה יעבור חלק
          pip install feedparser google-genai supabase requests

      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
