name: StyleMe Brute Force

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15 # אם זה לא עובד תוך 15 דקות, זה לא יעבוד בכלל

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install Dependencies Manually
        run: |
          python -m pip install --upgrade pip
          
          # 1. מתקינים את הספריות ה"קלות" קודם
          pip install requests supabase
          
          # 2. מתקינים את הרכיב החסר של ה-RSS ידנית
          pip install sgmllib3k
          
          # 3. מתקינים את feedparser בכוח, בלי לבדוק תלויות (כי התקנו אותן הרגע)
          pip install feedparser --no-deps
          
          # 4. מתקינים את גוגל אחרון, גם כן בלי לבדוק תלויות של אחרים
          pip install google-genai

      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
