name: StyleMe Bot 2.0

on:
  schedule:
    - cron: '*/30 * * * *'  # רץ כל 30 דקות
  workflow_dispatch:        # מאפשר הרצה ידנית לכפתור Run Workflow

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10     # הגנה כדי לא להיתקע

    steps:
      # 1. הורדת הקוד מהמאגר
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. התקנת פייתון
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      # 3. בדיקה שהקובץ קיים (דיבוג)
      - name: Verify Files
        run: ls -R

      # 4. התקנת ספריות (בלי קובץ requirements כדי למנוע טעויות)
      - name: Install Libraries
        run: |
          python -m pip install --upgrade pip
          pip install google-genai feedparser supabase requests

      # 5. הרצת הבוט
      - name: Run Main Script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
