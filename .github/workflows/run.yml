name: StyleMe Production

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # גרסה 3.10 יציבה יותר לערבוב ישן/חדש
          cache: 'pip'

      # שלב 1: התקנת הספריות הכבדות והחדשות
      - name: Install Core Libraries
        run: |
          python -m pip install --upgrade pip
          pip install google-genai supabase requests

      # שלב 2: התקנת הספרייה הבעייתית בנפרד (עם העוזר שלה)
      - name: Install RSS Parser
        run: |
          pip install sgmllib3k 
          pip install feedparser

      # שלב 3: הרצת הבוט
      - name: Run Bot
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py
